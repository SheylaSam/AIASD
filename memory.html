<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AISD Memory – Claude Code Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d0d0d;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #ffe600;
    letter-spacing: -0.5px;
  }

  header p {
    color: #888;
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .scoreboard {
    display: flex;
    gap: 32px;
    margin-bottom: 20px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 12px 32px;
    border: 1px solid #333;
  }

  .score-item {
    text-align: center;
  }

  .score-item .label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-item .value {
    font-size: 1.6rem;
    font-weight: 700;
    color: #ffe600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 700px;
    width: 100%;
  }

  .card {
    aspect-ratio: 1.2 / 1;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 12px;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card.matched .card-front {
    background: #1a3a1a;
    border-color: #00cc44;
  }

  .card.shake .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  .card-back, .card-front {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    text-align: center;
    font-size: 0.85rem;
    line-height: 1.3;
    border: 2px solid transparent;
  }

  .card-back {
    background: #1e1e1e;
    border-color: #333;
    font-size: 1.8rem;
    color: #ffe600;
    user-select: none;
  }

  .card-front {
    background: #1a1a2e;
    border-color: #ffe600;
    transform: rotateY(180deg);
    color: #fff;
    font-weight: 600;
  }

  .card-front.is-term {
    background: #0d1b2a;
    border-color: #4488ff;
    color: #88bbff;
    font-size: 1rem;
    font-weight: 700;
  }

  .card-front.is-definition {
    background: #1a1a2e;
    border-color: #ffe600;
    color: #eee;
    font-size: 0.78rem;
    font-weight: 400;
  }

  .win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .win-overlay.show {
    display: flex;
  }

  .win-box {
    background: #1a1a1a;
    border: 3px solid #ffe600;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    max-width: 400px;
  }

  .win-box h2 {
    font-size: 2.5rem;
    color: #ffe600;
    margin-bottom: 8px;
  }

  .win-box p {
    color: #ccc;
    margin-bottom: 24px;
    font-size: 1rem;
  }

  .win-box .stats {
    display: flex;
    gap: 32px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .win-box .stat { text-align: center; }
  .win-box .stat .n {
    font-size: 2rem;
    font-weight: 700;
    color: #ffe600;
  }
  .win-box .stat .l {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  button {
    background: #ffe600;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }

  button:hover { opacity: 0.85; transform: scale(1.03); }

  .badge {
    display: inline-block;
    background: #ffe600;
    color: #000;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <h1>AISD Memory</h1>
  <p>AI-Assisted Software Development · Claude Code Demo</p>
  <span class="badge">generiert von Claude Code</span>
</header>

<div class="scoreboard">
  <div class="score-item">
    <div class="label">Paare</div>
    <div class="value" id="matched">0 / 8</div>
  </div>
  <div class="score-item">
    <div class="label">Versuche</div>
    <div class="value" id="attempts">0</div>
  </div>
  <div class="score-item">
    <div class="label">Zeit</div>
    <div class="value" id="timer">0s</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <h2>Gewonnen! 🎉</h2>
    <p>Alle AISD-Begriffe gematcht!</p>
    <div class="stats">
      <div class="stat">
        <div class="n" id="finalAttempts">-</div>
        <div class="l">Versuche</div>
      </div>
      <div class="stat">
        <div class="n" id="finalTime">-</div>
        <div class="l">Sekunden</div>
      </div>
    </div>
    <button onclick="resetGame()">Nochmal spielen</button>
  </div>
</div>

<script>
const pairs = [
  { term: "Claude Code",        definition: "Agentic Coding CLI von Anthropic" },
  { term: "LLM",                definition: "Large Language Model" },
  { term: "Agentic Coding",     definition: "KI führt mehrstufige Tasks selbstständig aus" },
  { term: "Prompt Engineering", definition: "Optimierung von Anweisungen an ein KI-Modell" },
  { term: "RAG",                definition: "Retrieval Augmented Generation" },
  { term: "Fine-tuning",        definition: "Anpassen eines Modells mit eigenen Daten" },
  { term: "Token",              definition: "Grundeinheit der Sprachverarbeitung" },
  { term: "MCP",                definition: "Model Context Protocol" },
];

let cards = [], flipped = [], matchedCount = 0, attempts = 0, startTime = null, timerInterval = null;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function buildCards() {
  const items = [];
  pairs.forEach((p, i) => {
    items.push({ id: i, type: 'term',       text: p.term });
    items.push({ id: i, type: 'definition', text: p.definition });
  });
  return shuffle(items);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = buildCards();
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">?</div>
        <div class="card-front ${card.type === 'term' ? 'is-term' : 'is-definition'}">${card.text}</div>
      </div>`;
    el.addEventListener('click', () => onCardClick(el, idx));
    grid.appendChild(el);
  });
}

function onCardClick(el, idx) {
  if (flipped.length === 2) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

  if (!startTime) {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      document.getElementById('timer').textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
    }, 500);
  }

  el.classList.add('flipped');
  flipped.push({ el, idx, card: cards[idx] });

  if (flipped.length === 2) {
    attempts++;
    document.getElementById('attempts').textContent = attempts;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.card.id === b.card.id && a.card.type !== b.card.type) {
    // Match!
    setTimeout(() => {
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      flipped = [];
      matchedCount++;
      document.getElementById('matched').textContent = matchedCount + ' / 8';
      if (matchedCount === 8) showWin();
    }, 500);
  } else {
    // No match
    setTimeout(() => {
      [a.el, b.el].forEach(el => {
        el.classList.add('shake');
        setTimeout(() => {
          el.classList.remove('flipped', 'shake');
        }, 400);
      });
      flipped = [];
    }, 900);
  }
}

function showWin() {
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('finalAttempts').textContent = attempts;
  document.getElementById('finalTime').textContent = elapsed + 's';
  document.getElementById('winOverlay').classList.add('show');
}

function resetGame() {
  document.getElementById('winOverlay').classList.remove('show');
  flipped = []; matchedCount = 0; attempts = 0; startTime = null;
  clearInterval(timerInterval);
  document.getElementById('matched').textContent = '0 / 8';
  document.getElementById('attempts').textContent = '0';
  document.getElementById('timer').textContent = '0s';
  renderGrid();
}

renderGrid();
</script>
</body>
</html>
